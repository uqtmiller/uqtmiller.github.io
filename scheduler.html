        schoolCounts.set(team.school, (schoolCounts.get(team.school) || 0) + 1);
      }
      let singleTeamSchoolCount = 0;
      for (const count of schoolCounts.values()) {
        if (count === 1) {
          singleTeamSchoolCount += 1;
        }
      }

      store.dispatch({ type: ACTIONS.SET_TEAMS, payload: { teams } });
      showStatus(
        "Imported " + teams.length + " teams. Schools with exactly 1 team: " + singleTeamSchoolCount + ".",
        false
      );
    }

    async function allocateWithCpSat() {
      const state = store.getState();
      if (!state.teams.length) {
        showStatus("Import teams first.", true);
        return;
      }

      try {
        showStatus("CP-SAT allocation started...", false);
        const config = configFromInputs(state.teams);
        const allocation = await allocateCpSat(state.teams, config);
        store.dispatch({ type: ACTIONS.ALLOCATE, payload: { config, ...allocation } });
        showStatus("CP-SAT allocation complete.", false);
      } catch (error) {
        showStatus(error.message || String(error), true);
      }
    }

    function allocateWithSimple() {
      const state = store.getState();
      if (!state.teams.length) {
        showStatus("Import teams first.", true);
        return;
      }

      try {
        const config = configFromInputs(state.teams);
        const allocation = allocateSimple(state.teams, config);
        store.dispatch({ type: ACTIONS.ALLOCATE, payload: { config, ...allocation } });
        showStatus("Simple allocation complete.", false);
      } catch (error) {
        showStatus(error.message || String(error), true);
      }
    }

    const initialState = {
      teams: [],
      venues: [],
      unallocated: [],
      swapReport: [],
      activeTab: "schedule",
      config: {
        divisions: [],
        levels: [],
        venues: DEFAULT_VENUES.map((item) => item.name),
        venueCapacities: Object.fromEntries(DEFAULT_VENUES.map((item) => [item.name, item.capacity])),
        minSubdivisionSize: 7,
        maxSubdivisionSize: 9,
        maxOptimizationTimeSeconds: 5,
      },
    };

    const store = createStore(initialState);
    store.subscribe((state) => renderAll(state));

    document.getElementById("addVenueBtn").addEventListener("click", () => {
      addVenueRow("New Venue", 10);
    });

    document.getElementById("fileInput").addEventListener("change", async (event) => {
      try {
        await handleImportFile(event.target.files && event.target.files[0]);
      } catch (error) {
        showStatus(error.message || String(error), true);
      } finally {
        event.target.value = "";
      }
    });

    const allocateCpSatBtn = document.getElementById("allocateCpSatBtn");
    if (allocateCpSatBtn) {
      allocateCpSatBtn.addEventListener("click", allocateWithCpSat);
    }
    document.getElementById("allocateSimpleBtn").addEventListener("click", allocateWithSimple);

    document.getElementById("undoBtn").addEventListener("click", () => {
      if (!app.history.length) {
        return;
      }
      store.dispatch({ type: ACTIONS.UNDO });
      showStatus("Undo applied.", false);
    });

    document.getElementById("exportBtn").addEventListener("click", () => {
      const state = store.getState();
      if (!state.venues.length) {
        showStatus("Allocate first, then export.", true);
        return;
      }
      exportXlsx(state);
      showStatus("Export complete.", false);
    });

    document.getElementById("printBtn").addEventListener("click", () => window.print());

    document.getElementById("clearTeamsBtn").addEventListener("click", () => {
      app.history = [];
      store.dispatch({ type: ACTIONS.CLEAR });
      showStatus("Teams cleared.", false);
    });

    document.getElementById("scheduleTabBtn").addEventListener("click", () => {
      store.dispatch({ type: ACTIONS.SET_TAB, payload: { tab: "schedule" } });
    });

    document.getElementById("teamsTabBtn").addEventListener("click", () => {
      store.dispatch({ type: ACTIONS.SET_TAB, payload: { tab: "teams" } });
    });

    populateVenueTable(DEFAULT_VENUES);
    renderAll(store.getState());
  </script>
</body>
</html>
